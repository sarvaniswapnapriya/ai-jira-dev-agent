name: Jira Ticket Automation

on:
  repository_dispatch:
    types: [jira_ticket_created]

jobs:
  create-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create ticket file
        run: |
          echo "# Jira Ticket" > ticket.md
          echo "Ticket: ${{ github.event.client_payload.ticket }}" >> ticket.md
          echo "Title: ${{ github.event.client_payload.title }}" >> ticket.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: feature/${{ github.event.client_payload.ticket }}
          title: "${{ github.event.client_payload.ticket }} - ${{ github.event.client_payload.title }}"
          body: |
            Jira Ticket: ${{ github.event.client_payload.ticket }}
